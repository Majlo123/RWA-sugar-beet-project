server:
  port: 8080

spring:
  application:
    name: psp-card-service
  
  datasource:
    url: jdbc:postgresql://psp-card-db:5432/psp_card_db
    username: postgres
    password: super
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect