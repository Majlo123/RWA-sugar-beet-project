# High Availability & Resilience Configuration for PayPal Service

server:
  port: 8080
  ssl:
    enabled: false
  compression:
    enabled: true
    min-response-size: 1024

spring:
  application:
    name: paypal-service
  
  data:
    mongodb:
      uri: mongodb://admin:password@paypal-mongo-db:27017/paypal_db?authSource=admin

resilience4j:
  circuitbreaker:
    configs:
      default:
        register-health-indicator: true
        sliding-window-size: 100
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
    instances:
      paypal-api:
        base-config: default
        failure-rate-threshold: 45
  
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 1000
  
  bulkhead:
    configs:
      default:
        max-concurrent-calls: 100
        max-wait-duration: 10000

logging:
  level:
    root: WARN
    com.psp.paypal: INFO
    io.github.resilience4j: INFO
  file:
    name: logs/paypal-service.log
    max-size: 10MB
    max-history: 90

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  health:
    circuitbreakers:
      enabled: true

server:
  tomcat:
    threads:
      max: 200
      min-spare: 10
