server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive

  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://localhost:4200"
              - "http://localhost:3000"
              - "https://localhost"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders:
              - Authorization
              - X-Merchant-Id
            allowCredentials: true
      
      # Route definitions for the downstream microservices
      routes:
        # Auth routes (public) - handles /auth/* (nginx strips /api prefix)
        - id: auth-service
          uri: http://core-service:8080
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=0
        
        # Admin routes (protected - Super Admin only)
        - id: admin-service
          uri: http://core-service:8080
          predicates:
            - Path=/admin/**
          filters:
            - StripPrefix=0

        # Routes for the CORE service (includes transactions and QR code)
        - id: core-service
          uri: http://core-service:8080
          predicates:
            - Path=/core/**, /transactions/**, /api/qr/**
          filters:
            - StripPrefix=1 # If Angular sends /core/transactions, strip "core" and hit /transactions directly on 8080

        # Routes for the BANK service
        - id: bank-service
          uri: http://bank-service:8080
          predicates:
            - Path=/bank/**
          filters:
            - StripPrefix=1

        # Routes for the CARD service
        - id: card-service
          uri: http://card-service:8080
          predicates:
            - Path=/card/**
          filters:
            - StripPrefix=1

        # Routes for the PAYPAL service
        - id: paypal-service
          uri: http://paypal-service:8080
          predicates:
            - Path=/paypal/**
          filters:
            - StripPrefix=1

        # Routes for the CRYPTO service
        - id: crypto-service
          uri: http://crypto-service:8080
          predicates:
            - Path=/crypto/**
          filters:
            - StripPrefix=1

# Logging for easier debugging during the thesis defense
logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.http.server.reactive: DEBUG