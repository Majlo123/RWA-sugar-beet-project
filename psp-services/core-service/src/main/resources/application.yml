server:
  port: 8080

spring:
  application:
    name: psp-core-service
  
  datasource:
    url: jdbc:postgresql://psp-core-db:5432/psp_core_db
    username: postgres
    password: super
    # PCI DSS - Connection pool configuration
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # PCI DSS 10.5 - Format SQL logs
        format_sql: true
        use_sql_comments: true

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:PSP_JWT_SECRET_KEY_CHANGE_IN_PRODUCTION_MIN_256_BITS_LONG_ENOUGH}
  expiration: 3600000  # 1 hour in milliseconds
  refresh-expiration: 86400000  # 24 hours in milliseconds

# PSP Configuration
psp:
  disable-auth: ${PSP_DISABLE_AUTH:false}
  frontend-url: ${PSP_FRONTEND_URL:https://localhost}

# PCI DSS Security Configuration
pci-dss:
  # PCI DSS 3.5 - Encryption key (should be in environment variable in production)
  encryption:
    key: ${PCI_ENCRYPTION_KEY:PCI_DSS_AES256_KEY_CHANGE_IN_PROD}
    algorithm: AES/GCM/NoPadding
  
  # PCI DSS 8.1.6 - Account lockout settings
  account-lockout:
    max-failed-attempts: 6
    lockout-duration-minutes: 30
  
  # PCI DSS 10.2 - Audit logging
  audit:
    enabled: true
    retention-days: 365
    
  # PCI DSS 12.3 - Session management
  session:
    timeout-minutes: 15
    max-active-sessions: 100

# Logging configuration for PCI DSS 10.2
logging:
  level:
    com.psp.core: INFO
    com.psp.core.security: DEBUG
    com.psp.core.aspect: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/psp-core-service.log
    max-size: 10MB
    max-history: 90

# Management endpoints (for monitoring)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized